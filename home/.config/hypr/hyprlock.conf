general {
    disable_loading_bar = true
    hide_cursor = false
}

background {
    path = screenshot
    blur_passes = 3
    blur_size = 7
    noise = 0.012
    contrast = 0.95
    brightness = 0.85
    vibrancy = 0.15
}

# Pink accent bar, matches the SDDM login screen
shape {
    monitor =
    size = 6, 70
    color = rgb(d16e9e)
    rounding = 3

    position = 40, 5%
    halign = left
    valign = bottom
    zindex = 1
}

input-field {
    monitor =
    size = 420, 70

    inner_color = rgba(10, 11, 14, 0.55)
    font_color = rgb(e6e8ec)

    outline_thickness = 0
    rounding = 12

    position = 40, 5%
    halign = left
    valign = bottom

    dots_center = false
    fade_on_empty = false
    placeholder_text =
}
